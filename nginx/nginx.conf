# ============================================================
# nginx.conf - VoteStack reverse proxy
# Step 7: HTTPS termination, HTTP/2, compression, keep-alive
# Step 8: upstream with least_conn for multiple backend instances
# ============================================================

worker_processes      auto;          # one per CPU core
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;

    # Keep-alive: hold client connections open to avoid TCP handshake overhead
    keepalive_timeout   75s;
    keepalive_requests  1000;

    # Upstream keep-alive to backend C++ instances
    upstream_keepalive_timeout  60s;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        application/json
        application/javascript
        text/css
        text/html
        text/plain
        text/xml;

    # ── Buffer / timeout tuning ───────────────────────────────────────────────
    client_max_body_size        16m;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;

    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    proxy_buffer_size       16k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    # ── Security headers (applied globally) ──────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), camera=(self)" always;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api:10m   rate=100r/s;
    limit_req_zone  $binary_remote_addr  zone=auth:10m  rate=10r/s;
    limit_conn_zone $binary_remote_addr  zone=conn:10m;

    # ── Step 8: Upstream - multiple C++ instances with least_conn ────────────
    # Each instance runs on a different port (8081-8084).
    # Docker Compose scales via replicas; for bare-metal use fixed ports.
    upstream voting_backend {
        least_conn;                      # route to instance with fewest active connections

        server voting_server_1:8080  max_fails=3  fail_timeout=30s;
        server voting_server_2:8080  max_fails=3  fail_timeout=30s;
        server voting_server_3:8080  max_fails=3  fail_timeout=30s;
        server voting_server_4:8080  max_fails=3  fail_timeout=30s;

        # Keep persistent connections to each backend worker
        keepalive  32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # Allow Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;                  # HTTP/2 (nginx ≥ 1.25.1 syntax)
        server_name your-domain.com;     # ← replace with your actual domain

        # TLS certificates (managed by Certbot / Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

        # Modern TLS settings
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # HSTS - tell browsers to always use HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── CORS pre-flight ─────────────────────────────────────────────────
        # The C++ server handles CORS too; nginx passes OPTIONS through.
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # Required for upstream keepalive
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # ── API proxy ───────────────────────────────────────────────────────
        location /api/ {
            # Rate-limit API: 100 req/s per IP, burst 200, no-delay
            limit_req  zone=api  burst=200  nodelay;
            limit_conn conn 100;

            proxy_pass http://voting_backend;
        }

        # Stricter rate-limit on auth endpoints
        location /api/auth/ {
            limit_req  zone=auth  burst=20  nodelay;
            limit_conn conn 20;

            proxy_pass http://voting_backend;
        }

        # Health check - no rate limiting
        location /health {
            proxy_pass http://voting_backend;
            access_log off;
        }

        # ── Nginx status (for Prometheus nginx-exporter) ────────────────────
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.0.0.0/8;   # Docker internal network
            deny  all;
        }

        # ── Static frontend (optional - only if not using Netlify/Cloudflare) ─
        # If you serve the frontend directly from this server, uncomment:
        # location / {
        #     root  /var/www/votestack/frontend;
        #     index index.html;
        #     try_files $uri $uri/ /landing/index.html;
        # }
    }
}
