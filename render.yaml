# ============================================================
# render.yaml — Render.com deployment config
# ============================================================

services:

  # ── C++ Backend ─────────────────────────────────────────────
  - type: web
    name: voting-system-backend
    env: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: free
    healthCheckPath: /health

    envVars:

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: REDIS_URL
        sync: false

      - key: RATE_LIMIT_REQUESTS
        value: "100"

      - key: RATE_LIMIT_WINDOW_SEC
        value: "60"

      - key: LOG_FILE
        value: ""
