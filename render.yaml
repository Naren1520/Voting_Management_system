#
# render.yaml — Render.com deployment config

services:

  #  C++ Backend 
  - type: web
    name: voting-system-backend
    env: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: free
    healthCheckPath: /health

    envVars:

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: REDIS_URL
        sync: false

      - key: RATE_LIMIT_REQUESTS
        value: "100"

      - key: RATE_LIMIT_WINDOW_SEC
        value: "60"

      - key: LOG_FILE
        value: ""

      # Face verification service (optional — deploy face-service/ separately)
      - key: FACE_SERVICE_URL
        sync: false        # set to your Modal/HuggingFace URL after deploying

      - key: FACE_API_SECRET
        sync: false        # must match FACE_API_SECRET in face-service

      - key: FACE_THRESHOLD
        value: "0.82"
