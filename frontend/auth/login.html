<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — VoteStack</title>
  <link rel="stylesheet" href="/shared/styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
      background:
        radial-gradient(ellipse at 70% 30%, rgba(0,255,136,.07) 0%, transparent 55%),
        radial-gradient(ellipse at 30% 70%, rgba(0,217,255,.07) 0%, transparent 55%);
      position: relative; z-index: 1;
    }
    .auth-box { width: 100%; max-width: 440px; }
    .auth-header { text-align: center; margin-bottom: 40px; }
    .auth-header img { width: 56px; height: 56px; border-radius: 14px; margin-bottom: 20px; }
    .auth-header h1 { font-size: 30px; margin-bottom: 8px; }
    .auth-header p  { color: var(--text-2); font-size: 15px; }
    .auth-card { padding: 40px; }
    .auth-form { display: flex; flex-direction: column; gap: 20px; }
    .auth-footer { text-align: center; margin-top: 24px; color: var(--text-2); font-size: 14px; }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    #msg { display: none; }
    .password-wrap { position: relative; }
    .password-wrap .input-field { padding-right: 48px; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-2); font-size: 18px; padding: 4px;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-header">
        <img src="/assets/Logo.png" alt="VoteStack" />
        <h1 class="gradient-text">Welcome Back</h1>
        <p>Log in to manage your elections</p>
      </div>
      <div class="card auth-card">
        <div id="msg" class="msg"></div>
        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)" novalidate>
          <div class="input-group">
            <label for="email">Email Address</label>
            <input id="email" class="input-field" type="email"
              placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <div class="password-wrap">
              <input id="password" class="input-field" type="password"
                placeholder="Your password" required autocomplete="current-password" />
              <button type="button" class="eye-btn" onclick="togglePwd()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
            Log In
          </button>
        </form>
        <div class="divider" style="margin:24px 0">or</div>
        <div class="auth-footer">
          Don't have an account? <a href="/auth/signup.html">Sign Up Free</a>
        </div>
      </div>
      <div style="text-align:center;margin-top:20px;">
        <a href="/landing/index.html" style="color:var(--text-3);font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to home
        </a>
      </div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script src="/shared/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => Auth.requireGuest());

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg msg-' + type;
      el.style.display = 'block';
    }

    function togglePwd() {
      const f = document.getElementById('password');
      f.type = f.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');

      if (!email || !password) {
        showMsg('Please enter your email and password', 'error'); return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Logging in…';

      const res = await API.login(email, password);

      if (res.success) {
        Auth.save(res.token, res.user);
        showMsg('Login successful! Redirecting…', 'success');
        setTimeout(() => window.location.href = '/dashboard/index.html', 800);
      } else {
        showMsg(res.message || 'Login failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }
  </script>
</body>
</html>
