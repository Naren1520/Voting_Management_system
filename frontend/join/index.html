<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Join an Election — VoteStack</title>
  <meta name="description" content="Enter your election ID to cast your vote on VoteStack."/>
  <link rel="icon" href="/assets/Logo.png" type="image/png"/>
  <link rel="stylesheet" href="/shared/styles.css"/>
  <link rel="stylesheet" href="join.css"/>
</head>
<body>

  <div class="join-wrap">

    <a class="join-brand" href="/landing/index.html">
      <img src="/assets/Logo.png" alt="VoteStack"/>
      <span>VoteStack</span>
    </a>

    <div class="join-card">

      <div class="join-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>

      <div class="join-title">Cast Your Vote</div>
      <div class="join-sub">
        Enter the Election ID shared by your election organiser to access the ballot.
      </div>

      <label class="field-label" for="electionIdInput">Election ID</label>
      <input
        id="electionIdInput"
        class="field-input"
        type="text"
        placeholder="e.g. 5a64f9eb-7b89-4085-87e4-a06b357fc832"
        autocomplete="off"
        spellcheck="false"
        onkeydown="if(event.key==='Enter') joinElection()"
      />
      <div class="field-hint">Ask your election organiser for the Election ID.</div>

      <div class="join-error" id="joinError" role="alert"></div>

      <button class="join-btn" id="joinBtn" onclick="joinElection()">
        Open Ballot
        <svg viewBox="0 0 24 24">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>

      <div class="join-divider"><span>or</span></div>

      <div class="join-login-link">
        Organising an election?
        <a href="/auth/login.html">Sign in to your dashboard</a>
      </div>

    </div>

    <div class="join-footer">
      <a href="/landing/index.html">← Back to home</a>
      &nbsp;·&nbsp;
      <a href="/privacy/index.html">Privacy</a>
      &nbsp;·&nbsp;
      <a href="/terms/index.html">Terms</a>
    </div>

  </div>

  <script src="/config.js"></script>
  <script src="/shared/api.js"></script>
  <script src="join.js"></script>
</body>
</html>
