<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My Profile — VoteStack</title>
  <meta name="description" content="View and manage your VoteStack account profile." />
  <link rel="icon" href="/assets/Logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="profile.css" />
</head>
<body>

 
  <div id="profSkeletonOverlay" class="psk-overlay" aria-hidden="true">

    <div class="psk-header">
      <div class="psk-header-inner">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="psk-box" style="width:32px;height:32px;border-radius:50%"></div>
          <div class="psk-box" style="width:96px;height:18px;border-radius:6px"></div>
        </div>
        <div class="psk-box" style="width:104px;height:34px;border-radius:8px"></div>
      </div>
    </div>

    <div class="psk-page">

      <div class="psk-hero">
        <div class="psk-box" style="width:120px;height:120px;border-radius:50%;margin:0 auto 24px"></div>
        <div class="psk-box" style="width:200px;height:28px;border-radius:8px;margin:0 auto 12px"></div>
        <div class="psk-box" style="width:100px;height:14px;border-radius:6px;margin:0 auto"></div>
      </div>

      <div class="psk-card">
        <div class="psk-box" style="width:130px;height:11px;border-radius:4px;margin-bottom:28px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px">
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="psk-box" style="width:80px;height:11px;border-radius:4px"></div>
            <div class="psk-box" style="width:100%;height:44px;border-radius:12px"></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="psk-box" style="width:110px;height:11px;border-radius:4px"></div>
            <div class="psk-box" style="width:100%;height:44px;border-radius:12px"></div>
          </div>
        </div>
        <div class="psk-box" style="width:100%;height:68px;border-radius:20px"></div>
      </div>

     
      <div class="psk-card">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:32px">
          <div class="psk-box" style="width:48px;height:48px;border-radius:12px;flex-shrink:0"></div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="psk-box" style="width:90px;height:18px;border-radius:6px"></div>
            <div class="psk-box" style="width:150px;height:13px;border-radius:6px"></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:20px">
          <div class="psk-box" style="width:100%;height:50px;border-radius:12px"></div>
          <div class="psk-box" style="width:100%;height:50px;border-radius:12px"></div>
          <div class="psk-box" style="width:100%;height:50px;border-radius:12px"></div>
          <div class="psk-box" style="width:100%;height:50px;border-radius:12px;opacity:.6"></div>
        </div>
      </div>

    </div>
  </div>
 
  <div class="prof-bg-shapes">
    <div class="prof-shape prof-shape-1"></div>
    <div class="prof-shape prof-shape-2"></div>
  </div>


  <header class="prof-header">
    <div class="prof-header-inner">
      <a class="prof-brand" href="/landing/index.html">
        <img src="/assets/Logo.png" alt="VoteStack" />
        <span>VoteStack</span>
      </a>
      <a class="prof-back" href="/dashboard/index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        <span>Dashboard</span>
      </a>
    </div>
  </header>


  <main class="prof-page" id="profPage">

    
    <div class="prof-hero">
      <div class="prof-hero-avatar" id="profHeroAvatar">—</div>
      <h1 class="prof-hero-name" id="profHeroName">Loading…</h1>
      <p class="prof-hero-role">Administrator</p>
    </div>

   
    <div class="prof-content">

      
      <section class="prof-card prof-card-account">
        <div class="prof-card-label">Account Details</div>
        <div class="prof-info-grid">
          <div class="prof-info-item">
            <div class="prof-info-label">Full Name</div>
            <div class="prof-info-value" id="profNameVal">—</div>
          </div>
          <div class="prof-info-item">
            <div class="prof-info-label">Email Address</div>
            <div class="prof-info-value prof-info-email" id="profEmailVal">—</div>
          </div>
        </div>

        
        <a class="prof-sessions-card" href="/profile/sessions/index.html">
          <div class="prof-sessions-left">
            <div class="prof-sessions-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <path d="M8 21h8M12 17v4"/>
              </svg>
            </div>
            <div>
              <div class="prof-sessions-title">Active Sessions</div>
              <div class="prof-sessions-desc">Manage devices & locations</div>
            </div>
          </div>
          <svg class="prof-sessions-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </a>
      </section>

      <section class="prof-card prof-card-security">
        <div class="prof-card-header">
          <div class="prof-card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div>
            <div class="prof-card-title">Security</div>
            <div class="prof-card-subtitle">Update your password</div>
          </div>
        </div>

        <div id="pwdMsg" class="prof-msg" role="alert" aria-live="polite"></div>

        <div class="prof-form">
          <div class="prof-input-group">
            <label for="currentPassword" class="prof-label">Current Password</label>
            <div class="prof-input-wrap">
              <input
                id="currentPassword"
                type="password"
                class="prof-input"
                placeholder="Enter your current password"
                autocomplete="current-password"
              />
              <button class="prof-eye" type="button" onclick="togglePwd('currentPassword', this)" aria-label="Toggle password visibility">
                <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="prof-input-group">
            <label for="newPassword" class="prof-label">New Password</label>
            <div class="prof-input-wrap">
              <input
                id="newPassword"
                type="password"
                class="prof-input"
                placeholder="At least 6 characters"
                autocomplete="new-password"
              />
              <button class="prof-eye" type="button" onclick="togglePwd('newPassword', this)" aria-label="Toggle password visibility">
                <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <div class="pwd-strength" id="pwdStrength" style="display:none">
              <div class="pwd-strength-bar">
                <div class="pwd-strength-fill" id="pwdStrengthFill"></div>
              </div>
              <span class="pwd-strength-label" id="pwdStrengthLabel"></span>
            </div>
          </div>

          <div class="prof-input-group">
            <label for="confirmPassword" class="prof-label">Confirm New Password</label>
            <div class="prof-input-wrap">
              <input
                id="confirmPassword"
                type="password"
                class="prof-input"
                placeholder="Re-enter new password"
                autocomplete="new-password"
              />
              <button class="prof-eye" type="button" onclick="togglePwd('confirmPassword', this)" aria-label="Toggle password visibility">
                <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <button class="prof-btn-update" id="updatePwdBtn" onclick="submitPasswordChange()">
            Update Password
          </button>
        </div>
      </section>

    </div>
  </main>


  <div class="prof-toast" id="profToast" role="status" aria-live="polite">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <span class="toast-msg"></span>
  </div>

  <script src="/config.js"></script>
  <script src="/shared/api.js"></script>
  <script src="profile.js"></script>
</body>
</html>
