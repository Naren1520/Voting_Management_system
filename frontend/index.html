<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting System - Cast Your Vote</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.5);
            --secondary: #00d9ff;
            --secondary-glow: rgba(0, 217, 255, 0.5);
            --accent: #ff0080;
            --accent-glow: rgba(255, 0, 128, 0.5);
            --success: #00ff88;
            --danger: #ff0055;
            --warning: #ffaa00;
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-card: #111111;
            --bg-card-hover: #1a1a1a;
            --border: #222222;
            --border-bright: #333333;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-dim: #666666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 0, 128, 0.1) 0%, transparent 50%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 136, 0.03) 2px,
                    rgba(0, 255, 136, 0.03) 4px
                );
            pointer-events: none;
            z-index: 1;
        }

        /* Header - Full Width */
        .header {
            background: var(--bg-card);
            color: white;
            padding: 24px 0;
            text-align: center;
            box-shadow: 
                0 0 40px rgba(0, 255, 136, 0.1),
                0 8px 32px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            border-bottom: 2px solid var(--border-bright);
            margin: 0;
            width: 100%;
        }

        .header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent,
                var(--primary),
                var(--secondary),
                var(--accent),
                transparent
            );
            opacity: 0.8;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        .admin-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 20px var(--primary-glow),
                0 4px 12px rgba(0, 0, 0, 0.5);
            animation: float 3s ease-in-out infinite;
            text-decoration: none;
        }

        .admin-icon:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 
                0 0 40px var(--primary-glow),
                0 6px 20px rgba(0, 0, 0, 0.6);
        }

        .header h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px var(--primary-glow);
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 5;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 28px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 
                0 0 40px rgba(0, 0, 0, 0.8),
                0 0 80px rgba(0, 255, 136, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            transform: scaleX(0);
            transition: transform 0.4s ease;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card:hover::after {
            opacity: 0.1;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 0 60px rgba(0, 0, 0, 0.9),
                0 0 100px var(--primary-glow),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .card h2 {
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .card h2::before {
            content: '';
            width: 4px;
            height: 28px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .required {
            color: var(--danger);
            margin-left: 0.25rem;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 
                0 0 0 4px var(--primary-glow),
                0 0 30px var(--primary-glow);
        }

        .input-field:disabled {
            background-color: var(--bg-secondary);
            color: var(--text-dim);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .help-text {
            display: block;
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Radio Buttons */
        .candidates-container {
            margin-top: 16px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: var(--bg-secondary);
        }

        .radio-label:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: var(--bg-card-hover);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateX(4px);
        }

        .radio-label.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .radio-label input[type="radio"] {
            display: none;
        }

        .radio-label input[type="radio"]:checked ~ .radio-custom {
            background-color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .radio-label input[type="radio"]:checked ~ .candidate-name {
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .radio-custom {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-bright);
            border-radius: 50%;
            margin-right: 16px;
            flex-shrink: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radio-label input[type="radio"]:checked ~ .radio-custom::after {
            content: '✓';
            color: #000;
            font-size: 14px;
            font-weight: bold;
        }

        .candidate-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 30px var(--primary-glow),
                0 4px 14px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 
                0 0 50px var(--primary-glow),
                0 6px 20px rgba(0, 0, 0, 0.6);
        }

        .btn:disabled {
            background: var(--bg-secondary);
            color: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
            border: 2px solid var(--border);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border-bright);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            box-shadow: 
                0 0 30px var(--primary-glow),
                0 6px 20px rgba(0, 0, 0, 0.6);
        }

        /* Messages */
        .message-container {
            margin-top: 20px;
            min-height: 0;
        }

        .message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 14px;
            animation: slideIn 0.3s ease-out;
            border: 2px solid;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .message.success {
            background: rgba(0, 255, 136, 0.1);
            color: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .message.error {
            background: rgba(255, 0, 85, 0.1);
            color: var(--danger);
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
        }

        .message.warning {
            background: rgba(255, 170, 0, 0.1);
            color: var(--warning);
            border-color: var(--warning);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.2);
        }

        /* Rules Section */
        .rules-section {
            grid-column: 1 / -1;
            background-color: rgba(0, 255, 136, 0.05);
            border-left: 4px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .rules-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .rules-list li {
            padding-left: 32px;
            position: relative;
            font-size: 15px;
            color: var(--text-primary);
        }

        .rules-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--primary);
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .rules-list strong {
            color: var(--primary);
            font-weight: 700;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* Loading States */
        .loading,
        .no-candidates,
        .no-results {
            text-align: center;
            color: var(--text-dim);
            padding: 40px 20px;
            font-style: italic;
        }

        .loading::before,
        .no-candidates::before,
        .no-results::before {
            content: '⏳';
            display: block;
            font-size: 48px;
            margin-bottom: 16px;
            filter: grayscale(0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        /* Footer */
        .footer {
            background-color: var(--bg-card);
            color: var(--text-secondary);
            text-align: center;
            padding: 24px;
            margin-top: 40px;
            font-size: 14px;
            border-top: 2px solid var(--border-bright);
        }

        .footer::before {
            content: '';
            display: block;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent,
                var(--primary),
                var(--secondary),
                var(--accent),
                transparent
            );
            margin-bottom: 16px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 32px;
            }

            .subtitle {
                font-size: 14px;
            }

            .admin-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
                right: 15px;
            }

            .card {
                padding: 24px;
            }

            .card h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 28px;
            }

            .container {
                padding: 20px 15px;
            }

            .card {
                padding: 20px;
            }

            .radio-label {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Full-Width Header -->
    <header class="header">
        <div class="header-content">
            <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                <img src="assets/Logo.png" alt="Logo" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary);">
                <div>
                    <h1>Voting System</h1>
                    <p class="subtitle">Cast Your Vote Securely</p>
                </div>
            </div>
            <a href="login.html" class="admin-icon" title="Admin Dashboard">A</a>
        </div>
    </header>

    <div class="container">
        <!-- Main Content -->
        <main class="main-content">
            <!-- Voting Section -->
            <section class="voting-section card">
                <h2>Cast Your Vote</h2>
                
                <!-- Voter ID Input -->
                <div class="form-group">
                    <label for="voterId">Voter ID <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="voterId" 
                        placeholder="Enter your unique voter ID"
                        class="input-field"
                    >
                    <small class="help-text">Your ID will be used to prevent duplicate voting</small>
                </div>

                <!-- Candidates Selection -->
                <div class="form-group">
                    <label>Select a Candidate <span class="required">*</span></label>
                    <div id="candidatesList" class="candidates-container">
                        <p class="loading">Loading candidates...</p>
                    </div>
                </div>

                <!-- Vote Button -->
                <button id="voteBtn" class="btn btn-primary" disabled>
                    Cast Your Vote
                </button>

                <!-- Messages -->
                <div id="voteMessage" class="message-container"></div>
            </section>

            <!-- Voting Rules -->
            <section class="rules-section card">
                <h2>Voting Rules</h2>
                <ul class="rules-list">
                    <li>Each voter ID can vote <strong>only once</strong></li>
                    <li>Once voted, you cannot change your vote</li>
                    <li>Enter a valid voter ID to proceed</li>
                    
                </ul>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2025 Secure Voting System</p>
        </footer>
    </div>

    <script>
        /**
         * Voting System - Frontend JavaScript
         */

        // ============================================================================
        // CONFIGURATION
        // ============================================================================
        const API_BASE_URL = 'http://localhost:8080';
        const VOTED_VOTER_ID_KEY = 'votedVoterId';

        // ============================================================================
        // STATE MANAGEMENT
        // ============================================================================
        let selectedCandidate = null;
        let hasAlreadyVoted = false;
        let candidates = [];

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Initializing Voting System...');
            
            loadCandidates();
            checkIfAlreadyVoted();
            attachEventListeners();
        });

        // ============================================================================
        // EVENT LISTENERS
        // ============================================================================
        function attachEventListeners() {
            document.getElementById('voteBtn').addEventListener('click', submitVote);
            document.getElementById('voterId').addEventListener('input', validateVotingForm);
            
            document.addEventListener('change', (e) => {
                if (e.target.name === 'candidate') {
                    selectedCandidate = e.target.value;
                    validateVotingForm();
                }
            });
        }

        // ============================================================================
        // CANDIDATE MANAGEMENT
        // ============================================================================
        function loadCandidates() {
            console.log('Fetching candidates from API...');
            console.log('API URL:', API_BASE_URL);
            
            fetch(`${API_BASE_URL}/candidates`)
                .then(response => {
                    console.log('Response status:', response.status);
                    console.log('Response ok:', response.ok);
                    if (!response.ok) throw new Error('Failed to load candidates');
                    return response.json();
                })
                .then(data => {
                    console.log('Raw data received:', data);
                    console.log('Data type:', typeof data);
                    console.log('Is array:', Array.isArray(data));
                    candidates = data;
                    displayCandidates(data);
                    console.log('Candidates loaded:', data);
                })
                .catch(error => {
                    console.error('Error loading candidates:', error);
                    showError('candidatesList', 'Failed to load candidates. Make sure the server is running on http://localhost:8080');
                });
        }

        function displayCandidates(candidateList) {
            const container = document.getElementById('candidatesList');
            console.log('displayCandidates called with:', candidateList);
            console.log('Container element:', container);
            
            if (!container) {
                console.error('candidatesList container not found!');
                return;
            }
            
            if (!candidateList || candidateList.length === 0) {
                console.log('No candidates to display');
                container.innerHTML = '<p class="no-candidates">No candidates available</p>';
                return;
            }
            
            let html = '<div class="radio-group">';
            
            candidateList.forEach((candidate, index) => {
                console.log(`Processing candidate ${index}:`, candidate);
                const candidateName = candidate.name;
                const isDisabled = hasAlreadyVoted ? 'disabled' : '';
                
                html += `
                    <label class="radio-label ${isDisabled}">
                        <input 
                            type="radio" 
                            name="candidate" 
                            value="${candidateName}"
                            ${isDisabled}
                        >
                        <span class="radio-custom"></span>
                        <span class="candidate-name">${escapeHtml(candidateName)}</span>
                    </label>
                `;
            });
            
            html += '</div>';
            console.log('Final HTML:', html.substring(0, 200));
            container.innerHTML = html;
            console.log('Container innerHTML set. Contents:', container.innerHTML.substring(0, 200));
        }

        // ============================================================================
        // VOTING FUNCTIONALITY
        // ============================================================================
        function validateVotingForm() {
            const voterId = document.getElementById('voterId').value.trim();
            const candidateSelected = selectedCandidate !== null;
            const voteBtn = document.getElementById('voteBtn');
            
            voteBtn.disabled = !voterId || !candidateSelected || hasAlreadyVoted;
        }

        function checkVoterRegistration(voterId) {
            // Check backend for registered voters (this includes voters synced from admin panel)
            return fetch(`${API_BASE_URL}/checkVoter`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ voter_id: voterId })
            })
            .then(response => response.json())
            .then(data => {
                return data;
            })
            .catch(error => {
                console.error('Error checking voter:', error);
                return { success: false, message: 'Error checking voter registration' };
            });
        }

        function submitVote() {
            const voterId = document.getElementById('voterId').value.trim();
            const candidateName = selectedCandidate;
            
            if (!voterId) {
                showError('voteMessage', 'Please enter your voter ID');
                return;
            }
            
            if (!candidateName) {
                showError('voteMessage', 'Please select a candidate');
                return;
            }
            
            const voteBtn = document.getElementById('voteBtn');
            voteBtn.disabled = true;
            voteBtn.textContent = 'Checking registration...';
            
            // First check if voter is registered
            checkVoterRegistration(voterId).then(checkResult => {
                if (!checkResult.registered) {
                    showError('voteMessage', `✗ ${checkResult.message}`);
                    voteBtn.disabled = false;
                    voteBtn.textContent = 'Cast Your Vote';
                    return;
                }
                
                // Voter is registered, proceed with voting
                voteBtn.textContent = 'Casting vote...';
                
                const payload = {
                    voter_id: voterId,
                    candidate_name: candidateName
                };
                
                console.log('Submitting vote:', payload);
                
                fetch(`${API_BASE_URL}/vote`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Vote response:', data);
                    
                    if (data.success) {
                        showSuccess('voteMessage', `✓ ${data.message}`);
                        
                        // Clear form for next voter
                        document.getElementById('voterId').value = '';
                        document.getElementById('voterId').focus();
                        selectedCandidate = null;
                        
                        // Uncheck all radio buttons
                        document.querySelectorAll('input[name="candidate"]').forEach(radio => {
                            radio.checked = false;
                        });
                        
                        voteBtn.disabled = true;
                        voteBtn.textContent = 'Cast Your Vote';
                        
                        // Auto-refresh after 2 seconds
                        setTimeout(() => {
                            location.reload();
                        }, 2000);
                    } else {
                        showError('voteMessage', `✗ ${data.message}`);
                        voteBtn.disabled = false;
                        voteBtn.textContent = 'Cast Your Vote';
                    }
                })
                .catch(error => {
                    console.error('Error submitting vote:', error);
                    showError('voteMessage', 'Error submitting vote. Make sure the server is running.');
                    voteBtn.disabled = false;
                    voteBtn.textContent = 'Cast Your Vote';
                });
            });
        }

        function disableVotingInterface() {
            // No longer disables voting interface - allows continuous voting
            document.getElementById('voteBtn').disabled = true;
        }

        function checkIfAlreadyVoted() {
            // No longer checks for previous votes - allows continuous voting
            hasAlreadyVoted = false;
        }

        // ============================================================================
        // UTILITY FUNCTIONS
        // ============================================================================
        function showSuccess(containerId, message) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="message success">${message}</div>`;
            container.style.display = 'block';
        }

        function showError(containerId, message) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="message error">${message}</div>`;
            container.style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
