# ============================================================
# netlify.toml — VoteStack frontend (Netlify deployment)
# Publish directory: frontend/
# ============================================================

[build]
  publish = "."

# ── Root → landing page ──────────────────────────────────────
[[redirects]]
  from   = "/"
  to     = "/landing/index.html"
  status = 301

# ── Clean URLs: /login → /auth/login.html ────────────────────
# Lets you share /login instead of /auth/login.html
[[redirects]]
  from   = "/login"
  to     = "/auth/login.html"
  status = 301

[[redirects]]
  from   = "/signup"
  to     = "/auth/signup.html"
  status = 301

[[redirects]]
  from   = "/dashboard"
  to     = "/dashboard/index.html"
  status = 301

[[redirects]]
  from   = "/profile"
  to     = "/profile/index.html"
  status = 301

[[redirects]]
  from   = "/join"
  to     = "/join/index.html"
  status = 301

[[redirects]]
  from   = "/face-enroll"
  to     = "/face-enroll/index.html"
  status = 301

[[redirects]]
  from   = "/vote/:id"
  to     = "/vote/index.html"
  status = 200

[[redirects]]
  from   = "/vote-multi/:id"
  to     = "/vote-multi/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), camera=()"

# Cache static assets aggressively, HTML never
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
